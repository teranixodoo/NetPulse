tls:
  certificates:
    - certFile: /etc/traefik/certs/cert.pem
      keyFile:  /etc/traefik/certs/key.pem
  options:
    default:
      minVersion: VersionTLS12

http:
  middlewares:
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"

  routers:
    backend-api:
      rule: "(Host(`netpulse.local`) || HostRegexp(`^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$`)) && (PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`) || PathPrefix(`/auth`) || PathPrefix(`/health`) || PathPrefix(`/mac`) || Path(`/scan`) || PathPrefix(`/scan/`) || PathPrefix(`/poll`) || PathPrefix(`/discovery`) || PathPrefix(`/scan-exclusions`) || PathPrefix(`/topology/`) || PathPrefix(`/buildings`))"
      entryPoints:
        - websecure
      tls: {}
      service: backend-api
      priority: 10

  services:
    backend-api:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:8000"
