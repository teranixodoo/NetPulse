# Traefik statická konfigurace
api:
  dashboard: false

log:
  level: WARN

entryPoints:
  web:
    address: ":8080"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":8443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: netpulse_default
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
