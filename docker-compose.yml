services:

  # ---------------------------------------------------------------------------
  # Traefik — HTTPS reverse proxy
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "8080:8080"    # HTTP → redirect na HTTPS
      - "8443:8443"    # HTTPS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
    networks:
      - netpulse_net
    depends_on:
      - frontend-react

  # ---------------------------------------------------------------------------
  # Databáze
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       netpulse
      POSTGRES_USER:     netpulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./shared/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netpulse"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - netpulse_net

  # ---------------------------------------------------------------------------
  # Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    network_mode: host   # ICMP ping + SNMP UDP vyžaduje host network
    environment:
      DATABASE_URL:      postgresql://netpulse:${POSTGRES_PASSWORD}@127.0.0.1:5433/netpulse
      NETPULSE_DB_URL:   postgresql://netpulse:${POSTGRES_PASSWORD}@127.0.0.1:5433/netpulse
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY}
      PORT:              8000
      JWT_SECRET:        ${JWT_SECRET}
      TZ:                Europe/Prague
    volumes:
      - backup_data:/backups
    user: "0"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Starý Streamlit frontend (souběžně během přechodu)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NETPULSE_API_URL=http://127.0.0.1:8000
      - STREAMLIT_SERVER_COOKIE_SECRET=nejake_nahodne_dlouhe_heslo_123
    ports:
      - "8501:8501"
    networks:
      - netpulse_net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js / React
  # ---------------------------------------------------------------------------
  frontend-react:
    build:
      context: .
      dockerfile: Dockerfile.frontend-react
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Backend běží v host network — přístupný přes host-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Backend proxy — host.docker.internal = Docker host gateway
      # Backend běží v host network → dostupný přes tuto adresu
      API_URL:             "http://host.docker.internal:8000"
      NEXT_PUBLIC_API_URL: "http://host.docker.internal:8000"
    volumes:
      - ./shared/maps:/shared/maps:ro
    networks:
      - netpulse_net
    # Port 3000 již NENÍ přímo exponován — přístup jen přes Traefik HTTPS
    # Pro debug lze dočasně odkomentovat:
    # ports:
    #   - "3000:3000"
    labels:
      - "traefik.enable=true"
      # Frontend router — nižší priorita (zachytí vše co není API)
      - "traefik.http.routers.frontend.rule=Host(`netpulse.local`) || HostRegexp(`^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.middlewares=security-headers@file"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=netpulse_netpulse_net"

volumes:
  pg_data:
  backup_data:

networks:
  netpulse_net:
    driver: bridge
